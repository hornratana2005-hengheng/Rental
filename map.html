<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Map Example</title>
</head>
<body>

    <h1>Image Map Practice</h1>
    <p>Click on different areas of the image.</p>

    <!-- Image -->
    <img src="images/1"
         alt="Sample Image"
         usemap="#mymap">

    <!-- Image Map -->
    <map name="mymap">

        <!-- Rectangle Area -->
        <area shape="rect"
              coords="50,50,250,150"
              href="https://www.google.com"
              alt="Google"
              target="_blank">

        <!-- Circle Area -->
        <area shape="circle"
              coords="400,100,60"
              href="https://www.youtube.com"
              alt="YouTube"
              target="_blank">

        <!-- Polygon Area -->
        <area shape="poly"
              coords="250,250,350,200,450,250,400,350,300,350"
              href="https://www.github.com"
              alt="GitHub"
              target="_blank">

    </map>

</body>
</html>
